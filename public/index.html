<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodChoose — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E85A2A;
      --brown: #2C1810;
      --gold: #F9C74F;
      --cream: #FFF8F3;
      --muted: #8B6554;
      --text: #1A1209;
      --border: #F0E6DE;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--brown);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(232,90,42,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(249,199,79,0.08) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(232,90,42,0.1) 0%, transparent 50%);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(255,248,243,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,248,243,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .float-elem {
      position: fixed; z-index: 0; font-size: 80px; opacity: 0.04;
      animation: floatAnim 8s ease-in-out infinite;
      user-select: none;
    }
    .float-elem:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
    .float-elem:nth-child(2) { top: 30%; right: 8%; animation-delay: 2s; }
    .float-elem:nth-child(3) { bottom: 20%; left: 10%; animation-delay: 4s; }
    .float-elem:nth-child(4) { bottom: 10%; right: 5%; animation-delay: 1s; }
    @keyframes floatAnim {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* Card */
    .login-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px; padding: 20px;
    }
    .login-card {
      background: var(--cream);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,248,243,0.1);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo-wrap {
      text-align: center; margin-bottom: 36px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: var(--orange);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(232,90,42,0.35);
    }
    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 900;
      color: var(--brown);
      letter-spacing: -0.5px;
    }
    .logo-title span { color: var(--orange); }
    .logo-sub {
      font-size: 13px; color: var(--muted);
      margin-top: 4px; font-weight: 400;
    }

    /* Form */
    .form-label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .form-group { margin-bottom: 20px; }
    .form-input {
      width: 100%; padding: 14px 18px;
      background: white; border: 2px solid var(--border);
      border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif;
      color: var(--text); transition: all 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(232,90,42,0.1);
    }
    .form-input::placeholder { color: #C4A898; }

    .btn-login {
      width: 100%; padding: 16px;
      background: var(--orange); color: white;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.3px;
      margin-top: 8px;
    }
    .btn-login:hover { background: #D14D22; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(232,90,42,0.35); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #FEE2E2; color: #991B1B;
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; margin-top: 16px;
      display: none; animation: fadeIn 0.3s ease;
      border: 1px solid #FCA5A5;
    }
    .error-msg.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 28px 0 20px;
    }
    .hint {
      text-align: center; font-size: 12px; color: var(--muted);
    }

    /* Loading spinner */
    .spinner { display: none; }
    .btn-login.loading .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="bg-grid"></div>
  <span class="float-elem">🍽</span>
  <span class="float-elem">🥗</span>
  <span class="float-elem">🍜</span>
  <span class="float-elem">☕</span>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-wrap">
        <div class="logo-icon">🍽</div>
        <div class="logo-title">Food<span>Choose</span></div>
        <div class="logo-sub">Plateforme de choix de repas</div>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="employeeId">Identifiant</label>
          <input class="form-input" type="text" id="employeeId" placeholder="Ex: jdupont ou admin" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input class="form-input" type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
        </div>
        <button class="btn-login" type="submit" id="loginBtn">
          <span class="spinner"></span>
          Se connecter
        </button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <hr class="divider">
      <p class="hint">Contactez votre chargé(e) de commande pour obtenir vos identifiants.</p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('fc_token');
    const role = localStorage.getItem('fc_role');
    if (token && role) {
      window.location.href = role === 'admin' ? '/admin' : '/employee';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.classList.add('loading');
      btn.disabled = true;
      err.classList.remove('show');

      const employeeId = document.getElementById('employeeId').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employeeId, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur de connexion');
        localStorage.setItem('fc_token', data.token);
        localStorage.setItem('fc_role', data.role);
        localStorage.setItem('fc_name', data.name);
        localStorage.setItem('fc_eid', data.employeeId);
        window.location.href = data.role === 'admin' ? '/admin' : '/employee';
      } catch (err2) {
        err.textContent = err2.message;
        err.classList.add('show');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
